<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4 shadow" style="width:400px;">
<h3 class="text-center mb-3">Enter OTP</h3>
<form id="otpForm" method="POST" action="../php/verify_registration_otp.php">
<input type="text" name="otp" class="form-control mb-3" placeholder="6-digit OTP" required>
<button type="submit" class="btn btn-primary w-100">Verify OTP</button>
</form>
</div>
</div>

<script>
document.getElementById('otpForm').addEventListener('submit', function(e){
    e.preventDefault();
    const form = this;
    const button = form.querySelector('button');
    button.disabled = true;
    button.textContent = "Verifying...";

    const formData = new FormData(form);

    fetch(form.action,{
        method:"POST",
        body:formData
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.success){
            Swal.fire({icon:"success",title:data.message,timer:2000,showConfirmButton:false});
            setTimeout(()=>{window.location.href='../front/login.html';},2000);
        } else {
            Swal.fire("Error",data.message,"error");
        }
    })
    .finally(()=>{button.disabled=false; button.textContent="Verify OTP";});
});
</script>

</body>
</html>
