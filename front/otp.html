<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OTP Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
<link rel="stylesheet" href="../css/style.css" />
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow p-4" style="width: 400px;">

    <h3 class="text-center mb-4">OTP Verification</h3>
    <p class="text-center text-muted mb-4">Enter the OTP sent to your email to complete login.</p>

    <form id="otpForm" action="../php/verify_otp.php" method="POST">

      <div class="mb-3">
        <label class="form-label">OTP</label>
        <input type="text" name="otp" class="form-control" placeholder="Enter 6-digit OTP" required maxlength="6" />
      </div>

      <button type="submit" class="btn btn-primary w-100" id="verifyButton">Verify OTP</button>
    </form>

    <div class="text-center mt-3">
      <p>Didn't receive OTP? <a href="login.html" class="text-decoration-none">Login Again</a></p>
    </div>

  </div>
</div>

<script>
document.getElementById("otpForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = this;
    const button = document.getElementById("verifyButton");
    button.disabled = true;
    button.innerText = "Verifying...";

    const formData = new FormData(form);

    fetch(form.action, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            Swal.fire({
                icon: "success",
                title: "Login Successful",
                text: data.message || "Welcome!",
                timer: 1500,
                showConfirmButton: false
            });
            setTimeout(() => { window.location.href = "../dashboard.php"; }, 1500);
        } else {
            Swal.fire("OTP Verification Failed", data.message || "Invalid OTP", "error");
        }
    })
    .catch(() => {
        Swal.fire("Error", "Something went wrong", "error");
    })
    .finally(() => {
        button.disabled = false;
        button.innerText = "Verify OTP";
    });
});
</script>

</body>
</html>
